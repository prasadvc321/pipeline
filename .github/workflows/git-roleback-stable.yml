name: 🚀 AI Website Deployment Pipeline

on:
  # push:
  #   branches:
  #     - main
   workflow_dispatch:    
permissions:
  contents: write

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: 📦 Checkout Code
      uses: actions/checkout@v4

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: 🤖 AI Code Review Agent
      run: |
        python ai_agents/code_review_agent.py

    - name: 🔐 AI Security Agent
      run: |
        python ai_agents/security_agent.py

    - name: 🧠 AI Deployment Risk Agent
      run: |
        python ai_agents/deployment_risk_agent.py

    - name: 🚚 Upload Website to EC2
      run: |
        ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "
          mkdir -p ~/website
        "

        scp -o StrictHostKeyChecking=no -r * \
        ec2-user@${{ secrets.EC2_HOST }}:~/website/

    - name: 🐍 Install Requirements on EC2
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          sudo yum install -y python3 python3-pip git
          cd ~/website
          pip3 install -r requirements.txt
        '

    - name: 🛑 Stop Existing App
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          PID=$(lsof -t -i:5000 || true)
          if [ ! -z "$PID" ]; then
            kill -9 $PID
          fi
        '

    - name: 🚀 Start Website
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          cd ~/website
          nohup python3 -u app.py > output.log 2> error.log < /dev/null &
          sleep 10
          tail -n 20 output.log
        '

    - name: 📄 AI Log Analysis Agent
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          cd ~/website
          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
          export GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          python3 ai_agents/log_analysis_agent.py
        '

    - name: 🔍 Health Check
      run: |
        curl --fail http://${{ secrets.EC2_HOST }}:5000/health

    # ---------------- SUCCESS: SAVE STABLE VERSION ----------------

    - name: 🏷️ Update Last Stable Deployment Tag
      if: success()
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git tag -f prod-stable $GITHUB_SHA
        git push origin prod-stable --force

    - name: ✅ Deployment Success
      if: success()
      run: |
        echo "🚀 Deployment successful!"

    # ---------------- FAILURE: ROLLBACK ----------------

    - name: 🔁 Rollback to Last Stable Version (Git-based)
      if: failure()
      run: |
        ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

          echo "❌ Deployment failed. Rolling back to last stable version..."

          cd ~/website

          git fetch --tags origin

          echo "⬇️ Checking out prod-stable..."
          git checkout prod-stable

          PID=$(lsof -t -i:5000 || true)
          if [ ! -z "$PID" ]; then
            kill -9 $PID
          fi

          nohup python3 app.py > output.log 2>&1 < /dev/null &

          sleep 10

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Rollback successful"
          else
            echo "⚠️ Rollback completed but health check failed: $HTTP_CODE"
          fi

        EOF

    - name: 📌 Rollback Completed
      if: failure()
      run: |
        echo "🔁 System restored to last stable version"
