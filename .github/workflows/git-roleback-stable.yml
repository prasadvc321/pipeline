name: 🚀 AI Website Deployment Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

    - name: 📦 Checkout Code
      uses: actions/checkout@v4

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Install Local Dependencies
      run: |
        pip install -r requirements.txt

    ##################################################
    # AI QUALITY GATES
    ##################################################

    - name: 🤖 AI Code Review Agent
      run: |
        python ai_agents/code_review_agent.py

    - name: 🔐 AI Security Agent
      run: |
        python ai_agents/security_agent.py

    - name: 🧠 AI Deployment Advisory Agent
      continue-on-error: true
      run: |
        python ai_agents/deployment_risk_agent.py

    ##################################################
    # BACKUP CURRENT VERSION
    ##################################################

    - name: 💾 Backup Existing Deployment
      run: |
        ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} '
          rm -rf ~/website_backup

          if [ -d ~/website ]; then
            cp -r ~/website ~/website_backup
          fi
        '

    ##################################################
    # DEPLOY APPLICATION
    ##################################################

    - name: 🚚 Upload Website to EC2
      run: |
        ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} '
          mkdir -p ~/website
        '

        scp -o StrictHostKeyChecking=no -r * \
          ec2-user@${{ secrets.EC2_HOST }}:~/website/

    - name: 🐍 Install Dependencies on EC2
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          sudo yum install -y python3 python3-pip

          cd ~/website

          pip3 install -r requirements.txt
        '

    - name: 🛑 Stop Existing Application
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          PID=$(lsof -t -i:5000 || true)

          if [ ! -z "$PID" ]; then
            kill -9 $PID
          fi
        '

    - name: 🚀 Start Application
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          cd ~/website

          nohup python3 -u app.py \
            > output.log \
            2> error.log \
            < /dev/null &

          sleep 10
        '

    ##################################################
    # DEPLOYMENT VERIFICATION
    ##################################################

    - name: 🔍 Health Check
      run: |
        curl --fail http://${{ secrets.EC2_HOST }}:5000/healthhh

    ##################################################
    # SUCCESS
    ##################################################

    - name: ✅ Deployment Successful
      if: success()
      run: |
        echo "Deployment completed successfully."

    ##################################################
    # FAILURE HANDLING
    ##################################################

    - name: 📄 AI Log Analysis Agent
      if: failure()
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '
          cd ~/website

          export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

          python3 ai_agents/log_analysis_agent.py || true
        '

    - name: 🔁 Rollback to Previous Version
      if: failure()
      run: |
        ssh ec2-user@${{ secrets.EC2_HOST }} '

          echo "Deployment failed. Starting rollback..."

          PID=$(lsof -t -i:5000 || true)

          if [ ! -z "$PID" ]; then
            kill -9 $PID
          fi

          rm -rf ~/website

          if [ -d ~/website_backup ]; then
            mv ~/website_backup ~/website
          fi

          cd ~/website

          nohup python3 -u app.py \
            > output.log \
            2> error.log \
            < /dev/null &

          sleep 10

          curl --fail http://localhost:5000/health

          echo "Rollback completed successfully."
        '

    - name: ❌ Deployment Failed
      if: failure()
      run: |
        echo "Deployment failed and rollback executed."
